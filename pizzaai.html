<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Direct Widget Test
  </title>

</head>

<body
  style="
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:40px;
  "
>

  <h1>
    Direct Widget Test
  </h1>

  <script>

    async function startWidget() {

      const API_URL =
        "https://seven77luckydraws-ai.onrender.com";

      const businessId =
        "pizza-ai";

      // LOAD SETTINGS

      const response =
        await fetch(
          `${API_URL}/settings?businessId=${businessId}`
        );

      const settings =
        await response.json();

      // CREATE BUTTON

      const button =
        document.createElement("button");

      button.innerText =
        "Chat";

      button.style.position =
        "fixed";

      button.style.bottom =
        "20px";

      button.style.right =
        "20px";

      button.style.width =
        "70px";

      button.style.height =
        "70px";

      button.style.borderRadius =
        "50%";

      button.style.border =
        "none";

      button.style.background =
        settings.primary_color || "#dc2626";

      button.style.color =
        "white";

      button.style.fontSize =
        "18px";

      button.style.cursor =
        "pointer";

      document.body.appendChild(
        button
      );

      // CHAT BOX

      const box =
        document.createElement("div");

      box.style.position =
        "fixed";

      box.style.bottom =
        "100px";

      box.style.right =
        "20px";

      box.style.width =
        "320px";

      box.style.height =
        "420px";

      box.style.background =
        "#111827";

      box.style.borderRadius =
        "20px";

      box.style.display =
        "none";

      box.style.flexDirection =
        "column";

      box.style.padding =
        "15px";

      box.style.boxShadow =
        "0 0 25px rgba(0,0,0,0.4)";

      document.body.appendChild(
        box
      );

      // MESSAGES

      const messages =
        document.createElement("div");

      messages.style.flex =
        "1";

      messages.style.overflowY =
        "auto";

      messages.style.marginBottom =
        "15px";

      box.appendChild(messages);

      // INPUT

      const input =
        document.createElement("input");

      input.placeholder =
        "Type message...";

      input.style.padding =
        "12px";

      input.style.borderRadius =
        "12px";

      input.style.border =
        "none";

      input.style.marginBottom =
        "10px";

      box.appendChild(input);

      // SEND BUTTON

      const send =
        document.createElement("button");

      send.innerText =
        "Send";

      send.style.padding =
        "12px";

      send.style.border =
        "none";

      send.style.borderRadius =
        "12px";

      send.style.background =
        settings.primary_color || "#dc2626";

      send.style.color =
        "white";

      box.appendChild(send);

      // TOGGLE

      button.onclick = () => {

        box.style.display =
          box.style.display === "flex"
            ? "none"
            : "flex";

      };

      // SEND MESSAGE

      send.onclick = async () => {

        const text =
          input.value;

        if (!text) return;

        messages.innerHTML += `

          <div
            style="
              margin-bottom:10px;
              color:#22c55e;
            "
          >
            You: ${text}
          </div>

        `;

        input.value = "";

        const response =
          await fetch(
            `${API_URL}/chat`,
            {

              method: "POST",

              headers: {

                "Content-Type":
                  "application/json"

              },

              body: JSON.stringify({

                message: text,

                businessId

              })

            }
          );

        const data =
          await response.json();

        messages.innerHTML += `

          <div
            style="
              margin-bottom:15px;
              color:#60a5fa;
            "
          >
            AI: ${data.reply}
          </div>

        `;

        messages.scrollTop =
          messages.scrollHeight;

      };

    }

    startWidget();

  </script>

</body>

</html>
