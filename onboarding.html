<!DOCTYPE html>
<html>

<head>

  <title>
    Create AI Business
  </title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      background: #0f172a;

      color: white;

      font-family: Arial;

      padding: 30px;

      min-height: 100vh;

    }

    .topbar {

      display: flex;

      justify-content: space-between;
      align-items: center;

      margin-bottom: 30px;

      flex-wrap: wrap;

      gap: 20px;

    }

    h1 {

      margin: 0;

      font-size: 34px;

    }

    .status {

      background: #16a34a;

      padding: 10px 18px;

      border-radius: 30px;

      font-weight: bold;

      font-size: 14px;

    }

    .container {

      max-width: 850px;

      margin: auto;

    }

    .box {

      background: #111827;

      padding: 35px;

      border-radius: 24px;

      box-shadow:
        0 0 35px rgba(0,0,0,0.25);

    }

    .section-title {

      margin-bottom: 25px;

      font-size: 24px;

    }

    label {

      display: block;

      margin-bottom: 10px;

      color: #d1d5db;

      font-size: 14px;

    }

    input,
    textarea,
    select {

      width: 100%;

      padding: 15px;

      margin-bottom: 22px;

      border: none;

      border-radius: 14px;

      background: #1f2937;

      color: white;

      font-size: 15px;

      outline: none;

    }

    textarea {

      min-height: 160px;

      resize: vertical;

    }

    button {

      width: 100%;

      padding: 15px;

      background: #dc2626;

      border: none;

      border-radius: 14px;

      color: white;

      cursor: pointer;

      font-weight: bold;

      font-size: 15px;

      transition: 0.25s;

    }

    button:hover {

      transform: scale(1.02);

      opacity: 0.95;

    }

    .preview {

      margin-bottom: 25px;

      padding: 25px;

      border-radius: 18px;

      color: white;

      font-weight: bold;

      text-align: center;

      transition: 0.25s;

      box-shadow:
        inset 0 0 15px rgba(255,255,255,0.15);

    }

    .widget-box {

      margin-top: 30px;

      display: none;

      animation:
        fadeIn 0.4s ease;

    }

    pre {

      background: #020617;

      padding: 20px;

      border-radius: 16px;

      overflow-x: auto;

      color: #00ff88;

      line-height: 1.7;

      font-size: 14px;

    }

    .copy-button {

      margin-top: 15px;

      background: #2563eb;

    }

    .success {

      margin-top: 20px;

      color: #22c55e;

      text-align: center;

      display: none;

      font-weight: bold;

    }

    @keyframes fadeIn {

      from {

        opacity: 0;
        transform:
          translateY(10px);

      }

      to {

        opacity: 1;
        transform:
          translateY(0);

      }

    }

    @media (max-width: 700px) {

      body {

        padding: 18px;

      }

      h1 {

        font-size: 28px;

      }

      .box {

        padding: 25px;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <div class="topbar">

      <h1>
        Create AI Business
      </h1>

      <div class="status">
        ● LIVE
      </div>

    </div>

    <div class="box">

      <div class="section-title">
        AI Business Setup
      </div>

      <label>
        Business Name
      </label>

      <input
        id="businessName"
        placeholder="777LuckyDraws"
      />

      <label>
        Business ID
      </label>

      <input
        id="businessId"
        placeholder="777luckydraws"
      />

      <label>
        Owner Email
      </label>

      <input
        id="userEmail"
        placeholder="owner@email.com"
      />

      <label>
        AI Prompt
      </label>

      <textarea
        id="aiPrompt"
        placeholder="Describe how your AI assistant should behave..."
      ></textarea>

      <label>
        Widget Color
      </label>

      <select id="primaryColor">

        <option value="#dc2626">
          Red
        </option>

        <option value="#2563eb">
          Blue
        </option>

        <option value="#16a34a">
          Green
        </option>

        <option value="#9333ea">
          Purple
        </option>

        <option value="#f59e0b">
          Orange
        </option>

        <option value="#ec4899">
          Pink
        </option>

        <option value="#06b6d4">
          Cyan
        </option>

      </select>

      <div
        class="preview"
        id="preview"
        style="background:#dc2626;"
      >
        Widget Color Preview
      </div>

      <button onclick="createBusiness()">
        Create Business
      </button>

      <div
        class="success"
        id="successMessage"
      >
        ✅ Business Created Successfully
      </div>

      <!-- WIDGET CODE -->

      <div
        class="widget-box"
        id="widgetBox"
      >

        <h2>
          Widget Install Code
        </h2>

        <pre id="result">
Your widget code will appear here...
        </pre>

        <button
          class="copy-button"
          onclick="copyCode()"
        >
          Copy Widget Code
        </button>

      </div>

    </div>

  </div>

  <script>

    const API_URL =
      "https://seven77luckydraws-ai.onrender.com";

    // COLOR PREVIEW

    document.getElementById(
      "primaryColor"
    ).addEventListener(
      "change",
      (event) => {

        document.getElementById(
          "preview"
        ).style.background =
          event.target.value;

      }
    );

    // CREATE BUSINESS

    async function createBusiness() {

      const businessName =
        document.getElementById(
          "businessName"
        ).value;

      const businessId =
        document.getElementById(
          "businessId"
        ).value;

      const userEmail =
        document.getElementById(
          "userEmail"
        ).value;

      const aiPrompt =
        document.getElementById(
          "aiPrompt"
        ).value;

      const primaryColor =
        document.getElementById(
          "primaryColor"
        ).value;

      try {

        const response =
          await fetch(
            `${API_URL}/create-business`,
            {
              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({

                businessName,
                businessId,
                userEmail,
                aiPrompt,
                primaryColor

              })

            }
          );

        const data =
          await response.json();

        document.getElementById(
          "result"
        ).textContent =
          data.widgetCode;

        document.getElementById(
          "widgetBox"
        ).style.display =
          "block";

        const success =
          document.getElementById(
            "successMessage"
          );

        success.style.display =
          "block";

        setTimeout(() => {

          success.style.display =
            "none";

        }, 3000);

      } catch (error) {

        console.log(error);

      }

    }

    // COPY CODE

    function copyCode() {

      const code =
        document.getElementById(
          "result"
        ).textContent;

      navigator.clipboard.writeText(
        code
      );

      alert(
        "Widget code copied!"
      );

    }

  </script>

</body>

</html>
