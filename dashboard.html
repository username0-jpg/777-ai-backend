<script>

  const API_URL =
    "https://seven77luckydraws-ai.onrender.com";

  let businessId = "";
  let userEmail = "";

  // CHECK USER

  async function initializeDashboard() {

    try {

      const {
        data
      } = await supabaseClient
        .auth
        .getUser();

      // NOT LOGGED IN

      if (
        !data.user
      ) {

        window.location.href =
          "./login.html";

        return;

      }

      // USER EMAIL

      userEmail =
        data.user.email;

      document.getElementById(
        "userEmailText"
      ).innerText =
        userEmail;

      // LOAD BUSINESS

      const businessResponse =
        await fetch(
          `${API_URL}/my-business?userEmail=${userEmail}`
        );

      const business =
        await businessResponse.json();

      // SET BUSINESS

      businessId =
        business.business_id;

      // LOAD DATA

      await loadSettings();

      await loadLeads();

      await loadChatLogs();

      // AUTO REFRESH

      setInterval(() => {

        loadLeads();

        loadChatLogs();

      }, 10000);

    } catch (error) {

      console.log(error);

      alert(
        "Failed to load dashboard."
      );

    }

  }

  // COLOR PREVIEW

  document.getElementById(
    "primaryColor"
  ).addEventListener(
    "change",
    (event) => {

      document.getElementById(
        "colorPreview"
      ).style.background =
        event.target.value;

    }
  );

  // LOAD SETTINGS

  async function loadSettings() {

    try {

      const response =
        await fetch(
          `${API_URL}/settings?businessId=${businessId}`
        );

      const data =
        await response.json();

      document.getElementById(
        "businessName"
      ).value =
        data.business_name;

      document.getElementById(
        "prompt"
      ).value =
        data.ai_prompt;

      document.getElementById(
        "primaryColor"
      ).value =
        data.primary_color;

      document.getElementById(
        "colorPreview"
      ).style.background =
        data.primary_color;

    } catch (error) {

      console.log(error);

    }

  }

  // SAVE SETTINGS

  async function saveSettings() {

    const businessName =
      document.getElementById(
        "businessName"
      ).value;

    const aiPrompt =
      document.getElementById(
        "prompt"
      ).value;

    const primaryColor =
      document.getElementById(
        "primaryColor"
      ).value;

    try {

      await fetch(
        `${API_URL}/settings`,
        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"

          },

          body: JSON.stringify({

            businessId,

            businessName,

            aiPrompt,

            primaryColor

          })

        }
      );

      const status =
        document.getElementById(
          "save-status"
        );

      status.style.display =
        "block";

      setTimeout(() => {

        status.style.display =
          "none";

      }, 2500);

    } catch (error) {

      console.log(error);

    }

  }

  // LOAD LEADS

  async function loadLeads() {

    try {

      const response =
        await fetch(
          `${API_URL}/leads?userEmail=${userEmail}`
        );

      const data =
        await response.json();

      document.getElementById(
        "leadCount"
      ).textContent =
        data.length;

      const leadsDiv =
        document.getElementById(
          "leads"
        );

      leadsDiv.innerHTML = "";

      if (!data.length) {

        leadsDiv.innerHTML =
          "No leads yet.";

        return;

      }

      data.forEach((lead) => {

        leadsDiv.innerHTML += `

          <div class="lead">

            <strong>Email:</strong>
            ${lead.email}

            <br><br>

            <strong>Message:</strong>
            ${lead.message}

            <br><br>

            <strong>Business:</strong>
            ${lead.business_id}

          </div>

        `;

      });

    } catch (error) {

      console.log(error);

    }

  }

  // LOAD CHAT LOGS

  async function loadChatLogs() {

    try {

      const response =
        await fetch(
          `${API_URL}/chat-logs?businessId=${businessId}`
        );

      const data =
        await response.json();

      document.getElementById(
        "chatCount"
      ).textContent =
        data.length;

      const chatDiv =
        document.getElementById(
          "chatLogs"
        );

      chatDiv.innerHTML = "";

      if (!data.length) {

        chatDiv.innerHTML =
          "No conversations yet.";

        return;

      }

      data.slice(0, 10).forEach((chat) => {

        chatDiv.innerHTML += `

          <div class="chat-log">

            <div class="chat-user">

              <strong>User:</strong>
              ${chat.user_message}

            </div>

            <div class="chat-ai">

              <strong>AI:</strong>
              ${chat.ai_reply}

            </div>

          </div>

        `;

      });

    } catch (error) {

      console.log(error);

    }

  }

  // START DASHBOARD

  initializeDashboard();

</script>
