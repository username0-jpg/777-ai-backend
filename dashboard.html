<!DOCTYPE html>
<html>

<head>

  <title>
    777 AI Dashboard
  </title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <style>

    * {

      box-sizing: border-box;

    }

    body {

      margin: 0;

      font-family: Arial;

      background: #0f172a;

      color: white;

      padding: 30px;

    }

    .topbar {

      display: flex;

      justify-content: space-between;
      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    h1 {

      margin: 0;

      font-size: 34px;

    }

    .status {

      background: #16a34a;

      padding: 10px 18px;

      border-radius: 30px;

      font-weight: bold;

      font-size: 14px;

    }

    .dashboard-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(350px, 1fr));

      gap: 25px;

    }

    .card {

      background: #111827;

      border-radius: 22px;

      padding: 25px;

      box-shadow:
        0 0 30px rgba(0,0,0,0.25);

      transition: 0.25s;

    }

    .card:hover {

      transform: translateY(-4px);

    }

    h2 {

      margin-top: 0;

      margin-bottom: 20px;

      font-size: 22px;

    }

    label {

      display: block;

      margin-bottom: 10px;

      color: #d1d5db;

      font-size: 14px;

    }

    input,
    textarea,
    select {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 12px;

      background: #1f2937;

      color: white;

      font-size: 15px;

      outline: none;

      margin-bottom: 20px;

    }

    textarea {

      resize: vertical;

    }

    button {

      width: 100%;

      padding: 14px;

      background: #dc2626;

      border: none;

      border-radius: 12px;

      color: white;

      font-weight: bold;

      cursor: pointer;

      transition: 0.25s;

      font-size: 15px;

    }

    button:hover {

      transform: scale(1.02);

      opacity: 0.95;

    }

    .color-preview {

      width: 100%;

      height: 60px;

      border-radius: 14px;

      margin-bottom: 20px;

      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.15);

    }

    #save-status {

      margin-top: 15px;

      color: #22c55e;

      display: none;

      text-align: center;

      font-weight: bold;

    }

    .lead {

      background: #1f2937;

      padding: 18px;

      border-radius: 16px;

      margin-bottom: 15px;

      border-left:
        4px solid #dc2626;

      line-height: 1.7;

      animation:
        fadeIn 0.3s ease;

    }

    .lead strong {

      color: #d1d5db;

    }

    @keyframes fadeIn {

      from {

        opacity: 0;
        transform:
          translateY(10px);

      }

      to {

        opacity: 1;
        transform:
          translateY(0);

      }

    }

    #loading {

      color: #9ca3af;

    }

    .stats {

      display: flex;

      gap: 15px;

      margin-bottom: 20px;

      flex-wrap: wrap;

    }

    .stat-box {

      flex: 1;

      min-width: 120px;

      background: #1f2937;

      padding: 20px;

      border-radius: 16px;

      text-align: center;

    }

    .stat-number {

      font-size: 28px;

      font-weight: bold;

      margin-bottom: 5px;

    }

    .stat-label {

      color: #9ca3af;

      font-size: 14px;

    }

    @media (max-width: 700px) {

      body {

        padding: 18px;

      }

      h1 {

        font-size: 28px;

      }

    }

  </style>

</head>

<body>

  <div class="topbar">

    <h1>
      777 AI Dashboard
    </h1>

    <div class="status">
      ● LIVE
    </div>

  </div>

  <div class="stats">

    <div class="stat-box">

      <div
        class="stat-number"
        id="leadCount"
      >
        0
      </div>

      <div class="stat-label">
        Total Leads
      </div>

    </div>

    <div class="stat-box">

      <div class="stat-number">
        AI
      </div>

      <div class="stat-label">
        Assistant Online
      </div>

    </div>

  </div>

  <div class="dashboard-grid">

    <!-- SETTINGS -->

    <div class="card">

      <h2>
        Business Settings
      </h2>

      <label>
        Business Name
      </label>

      <input id="businessName" />

      <label>
        AI Prompt
      </label>

      <textarea
        id="prompt"
        rows="10"
      ></textarea>

      <label>
        Widget Color
      </label>

      <select id="primaryColor">

        <option value="#dc2626">
          Red
        </option>

        <option value="#2563eb">
          Blue
        </option>

        <option value="#16a34a">
          Green
        </option>

        <option value="#9333ea">
          Purple
        </option>

        <option value="#f59e0b">
          Orange
        </option>

        <option value="#ec4899">
          Pink
        </option>

        <option value="#06b6d4">
          Cyan
        </option>

      </select>

      <div
        class="color-preview"
        id="colorPreview"
      ></div>

      <button onclick="saveSettings()">
        Save Settings
      </button>

      <div id="save-status">
        ✅ Settings Saved
      </div>

    </div>

    <!-- LEADS -->

    <div class="card">

      <h2>
        Collected Leads
      </h2>

      <div id="loading">
        Loading leads...
      </div>

      <div id="leads"></div>

    </div>

  </div>

  <script>

    const API_URL =
      "https://seven77luckydraws-ai.onrender.com";

    const businessId =
      "777luckydraws";

    const userEmail =
      "owner@777luckydraws.com";

    // COLOR PREVIEW

    document.getElementById(
      "primaryColor"
    ).addEventListener(
      "change",
      (event) => {

        document.getElementById(
          "colorPreview"
        ).style.background =
          event.target.value;

      }
    );

    // LOAD SETTINGS

    async function loadSettings() {

      try {

        const response =
          await fetch(
            `${API_URL}/settings?businessId=${businessId}`
          );

        const data =
          await response.json();

        document.getElementById(
          "businessName"
        ).value =
          data.business_name;

        document.getElementById(
          "prompt"
        ).value =
          data.ai_prompt;

        document.getElementById(
          "primaryColor"
        ).value =
          data.primary_color;

        document.getElementById(
          "colorPreview"
        ).style.background =
          data.primary_color;

      } catch (error) {

        console.log(error);

      }

    }

    // SAVE SETTINGS

    async function saveSettings() {

      const businessName =
        document.getElementById(
          "businessName"
        ).value;

      const aiPrompt =
        document.getElementById(
          "prompt"
        ).value;

      const primaryColor =
        document.getElementById(
          "primaryColor"
        ).value;

      try {

        await fetch(
          `${API_URL}/settings`,
          {
            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({

              businessId,

              businessName,

              aiPrompt,

              primaryColor

            })

          }
        );

        const status =
          document.getElementById(
            "save-status"
          );

        status.style.display =
          "block";

        setTimeout(() => {

          status.style.display =
            "none";

        }, 2500);

      } catch (error) {

        console.log(error);

      }

    }

    // LOAD LEADS

    async function loadLeads() {

      try {

        const response =
          await fetch(
            `${API_URL}/leads?userEmail=${userEmail}`
          );

        const data =
          await response.json();

        document.getElementById(
          "loading"
        ).style.display =
          "none";

        document.getElementById(
          "leadCount"
        ).textContent =
          data.length;

        const leadsDiv =
          document.getElementById(
            "leads"
          );

        leadsDiv.innerHTML = "";

        if (!data.length) {

          leadsDiv.innerHTML =
            "No leads yet.";

          return;

        }

        data.forEach((lead) => {

          leadsDiv.innerHTML += `

            <div class="lead">

              <strong>Email:</strong>
              ${lead.email}

              <br><br>

              <strong>Message:</strong>
              ${lead.message}

              <br><br>

              <strong>Business:</strong>
              ${lead.business_id}

            </div>

          `;

        });

      } catch (error) {

        console.log(error);

      }

    }

    // AUTO REFRESH LEADS

    setInterval(() => {

      loadLeads();

    }, 10000);

    loadSettings();

    loadLeads();

  </script>

</body>

</html>
