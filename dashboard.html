<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    777 AI Dashboard
  </title>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./auth.js"></script>

  <style>

    * {

      box-sizing: border-box;

      margin: 0;
      padding: 0;

      font-family: Arial;

    }

    body {

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #111827,
          #1e293b
        );

      color: white;

      padding: 30px;

      min-height: 100vh;

    }

    .topbar {

      display: flex;

      justify-content: space-between;
      align-items: center;

      margin-bottom: 30px;

      flex-wrap: wrap;

      gap: 20px;

    }

    h1 {

      font-size: 36px;

    }

    .user-email {

      color: #9ca3af;

      margin-top: 10px;

    }

    .top-actions {

      display: flex;

      gap: 15px;

    }

    .status {

      background: #16a34a;

      padding: 12px 18px;

      border-radius: 30px;

      font-weight: bold;

    }

    .logout-btn {

      padding: 12px 18px;

      border: none;

      border-radius: 12px;

      background: #dc2626;

      color: white;

      cursor: pointer;

      font-weight: bold;

    }

    .stats {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(200px, 1fr));

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-box {

      background:
        rgba(17,24,39,0.92);

      padding: 25px;

      border-radius: 22px;

      text-align: center;

    }

    .stat-number {

      font-size: 32px;

      font-weight: bold;

      margin-bottom: 10px;

    }

    .stat-label {

      color: #9ca3af;

    }

    .dashboard-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(380px, 1fr));

      gap: 25px;

    }

    .card {

      background:
        rgba(17,24,39,0.92);

      padding: 28px;

      border-radius: 25px;

    }

    h2 {

      margin-bottom: 22px;

    }

    label {

      display: block;

      margin-bottom: 10px;

      color: #d1d5db;

    }

    input,
    textarea,
    select {

      width: 100%;

      padding: 15px;

      border: none;

      border-radius: 14px;

      background: #1f2937;

      color: white;

      margin-bottom: 20px;

    }

    button {

      width: 100%;

      padding: 15px;

      border: none;

      border-radius: 14px;

      background:
        linear-gradient(
          135deg,
          #dc2626,
          #ef4444
        );

      color: white;

      font-weight: bold;

      cursor: pointer;

    }

    .color-preview {

      width: 100%;

      height: 65px;

      border-radius: 16px;

      margin-bottom: 20px;

    }

    .lead,
    .chat-log {

      background: #1f2937;

      padding: 18px;

      border-radius: 18px;

      margin-bottom: 16px;

    }

    .chat-user {

      color: #22c55e;

      margin-bottom: 10px;

    }

    .chat-ai {

      color: #60a5fa;

    }

    #save-status {

      margin-top: 15px;

      color: #22c55e;

      display: none;

      text-align: center;

      font-weight: bold;

    }

  </style>

</head>

<body>

  <div class="topbar">

    <div>

      <h1>
        777 AI Dashboard
      </h1>

      <div
        class="user-email"
        id="userEmailText"
      >
        Loading...
      </div>

    </div>

    <div class="top-actions">

      <div class="status">
        ● LIVE
      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

  </div>

  <div class="stats">

    <div class="stat-box">

      <div
        class="stat-number"
        id="leadCount"
      >
        0
      </div>

      <div class="stat-label">
        Total Leads
      </div>

    </div>

    <div class="stat-box">

      <div
        class="stat-number"
        id="chatCount"
      >
        0
      </div>

      <div class="stat-label">
        Conversations
      </div>

    </div>

  </div>

  <div class="dashboard-grid">

    <div class="card">

      <h2>
        Business Settings
      </h2>

      <label>
        Business Name
      </label>

      <input id="businessName" />

      <label>
        AI Prompt
      </label>

      <textarea
        id="prompt"
        rows="8"
      ></textarea>

      <label>
        Widget Color
      </label>

      <select id="primaryColor">

        <option value="#dc2626">
          Red
        </option>

        <option value="#2563eb">
          Blue
        </option>

        <option value="#16a34a">
          Green
        </option>

        <option value="#9333ea">
          Purple
        </option>

      </select>

      <div
        class="color-preview"
        id="colorPreview"
      ></div>

      <button onclick="saveSettings()">
        Save Settings
      </button>

      <div id="save-status">
        ✅ Settings Saved
      </div>

    </div>

    <div class="card">

      <h2>
        Leads
      </h2>

      <div id="leads">
        Loading...
      </div>

    </div>

    <div class="card">

      <h2>
        Chat Logs
      </h2>

      <div id="chatLogs">
        Loading...
      </div>

    </div>

  </div>

  <script>

    const API_URL =
      "https://seven77luckydraws-ai.onrender.com";

    let businessId = "";
    let userEmail = "";

    async function initializeDashboard() {

      try {

        const {
          data
        } = await supabaseClient
          .auth
          .getUser();

        if (
          !data.user
        ) {

          window.location.href =
            "./login.html";

          return;

        }

        userEmail =
          data.user.email;

        document.getElementById(
          "userEmailText"
        ).innerText =
          userEmail;

        const businessResponse =
          await fetch(
            `${API_URL}/my-business?userEmail=${userEmail}`
          );

        const business =
          await businessResponse.json();

        businessId =
          business.business_id;

        await loadSettings();

        await loadLeads();

        await loadChatLogs();

        setInterval(() => {

          loadLeads();

          loadChatLogs();

        }, 10000);

      } catch (error) {

        console.log(error);

      }

    }

    document.getElementById(
      "primaryColor"
    ).addEventListener(
      "change",
      (event) => {

        document.getElementById(
          "colorPreview"
        ).style.background =
          event.target.value;

      }
    );

    async function loadSettings() {

      const response =
        await fetch(
          `${API_URL}/settings?businessId=${businessId}`
        );

      const data =
        await response.json();

      document.getElementById(
        "businessName"
      ).value =
        data.business_name;

      document.getElementById(
        "prompt"
      ).value =
        data.ai_prompt;

      document.getElementById(
        "primaryColor"
      ).value =
        data.primary_color;

      document.getElementById(
        "colorPreview"
      ).style.background =
        data.primary_color;

    }

    async function saveSettings() {

      const businessName =
        document.getElementById(
          "businessName"
        ).value;

      const aiPrompt =
        document.getElementById(
          "prompt"
        ).value;

      const primaryColor =
        document.getElementById(
          "primaryColor"
        ).value;

      await fetch(
        `${API_URL}/settings`,
        {

          method: "POST",

          headers: {

            "Content-Type":
              "application/json"

          },

          body: JSON.stringify({

            businessId,

            businessName,

            aiPrompt,

            primaryColor

          })

        }
      );

      const status =
        document.getElementById(
          "save-status"
        );

      status.style.display =
        "block";

      setTimeout(() => {

        status.style.display =
          "none";

      }, 2500);

    }

    async function loadLeads() {

      const response =
        await fetch(
          `${API_URL}/leads?userEmail=${userEmail}`
        );

      const data =
        await response.json();

      document.getElementById(
        "leadCount"
      ).textContent =
        data.length;

      const leadsDiv =
        document.getElementById(
          "leads"
        );

      leadsDiv.innerHTML = "";

      if (!data.length) {

        leadsDiv.innerHTML =
          "No leads yet.";

        return;

      }

      data.forEach((lead) => {

        leadsDiv.innerHTML += `

          <div class="lead">

            <strong>Email:</strong>
            ${lead.email}

            <br><br>

            <strong>Message:</strong>
            ${lead.message}

          </div>

        `;

      });

    }

    async function loadChatLogs() {

      const response =
        await fetch(
          `${API_URL}/chat-logs?businessId=${businessId}`
        );

      const data =
        await response.json();

      document.getElementById(
        "chatCount"
      ).textContent =
        data.length;

      const chatDiv =
        document.getElementById(
          "chatLogs"
        );

      chatDiv.innerHTML = "";

      if (!data.length) {

        chatDiv.innerHTML =
          "No conversations yet.";

        return;

      }

      data.slice(0, 10).forEach((chat) => {

        chatDiv.innerHTML += `

          <div class="chat-log">

            <div class="chat-user">

              <strong>User:</strong>
              ${chat.user_message}

            </div>

            <div class="chat-ai">

              <strong>AI:</strong>
              ${chat.ai_reply}

            </div>

          </div>

        `;

      });

    }

    initializeDashboard();

  </script>

</body>

</html>
