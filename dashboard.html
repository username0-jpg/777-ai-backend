<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    777 AI Dashboard
  </title>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="./auth.js"></script>

  <style>

    * {

      box-sizing: border-box;

      margin: 0;
      padding: 0;

      font-family: Arial;

    }

    body {

      background:
        linear-gradient(
          135deg,
          #0f172a,
          #111827,
          #1e293b
        );

      color: white;

      padding: 30px;

      min-height: 100vh;

    }

    .topbar {

      display: flex;

      justify-content: space-between;
      align-items: center;

      gap: 20px;

      flex-wrap: wrap;

      margin-bottom: 30px;

    }

    .left-topbar {

      display: flex;

      flex-direction: column;

      gap: 10px;

    }

    h1 {

      font-size: 38px;

    }

    .user-email {

      color: #9ca3af;

      font-size: 15px;

    }

    .top-actions {

      display: flex;

      gap: 15px;

      align-items: center;

    }

    .status {

      background: #16a34a;

      padding: 10px 18px;

      border-radius: 30px;

      font-weight: bold;

      font-size: 14px;

    }

    .logout-btn {

      padding: 12px 18px;

      border: none;

      border-radius: 12px;

      background: #dc2626;

      color: white;

      cursor: pointer;

      font-weight: bold;

    }

    .stats {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(200px, 1fr));

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-box {

      background:
        rgba(17,24,39,0.92);

      border-radius: 22px;

      padding: 25px;

      box-shadow:
        0 0 30px rgba(0,0,0,0.25);

      text-align: center;

      transition: 0.25s;

    }

    .stat-box:hover {

      transform: translateY(-4px);

    }

    .stat-number {

      font-size: 34px;

      font-weight: bold;

      margin-bottom: 10px;

    }

    .stat-label {

      color: #9ca3af;

    }

    .dashboard-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(380px, 1fr));

      gap: 25px;

    }

    .card {

      background:
        rgba(17,24,39,0.92);

      border-radius: 25px;

      padding: 28px;

      box-shadow:
        0 0 35px rgba(0,0,0,0.3);

      transition: 0.25s;

    }

    .card:hover {

      transform: translateY(-5px);

    }

    h2 {

      margin-bottom: 22px;

      font-size: 24px;

    }

    label {

      display: block;

      margin-bottom: 10px;

      color: #d1d5db;

      font-size: 14px;

    }

    input,
    textarea,
    select {

      width: 100%;

      padding: 15px;

      border: none;

      border-radius: 14px;

      background: #1f2937;

      color: white;

      font-size: 15px;

      outline: none;

      margin-bottom: 20px;

    }

    textarea {

      resize: vertical;

    }

    button {

      width: 100%;

      padding: 15px;

      border: none;

      border-radius: 14px;

      background:
        linear-gradient(
          135deg,
          #dc2626,
          #ef4444
        );

      color: white;

      font-weight: bold;

      cursor: pointer;

      transition: 0.25s;

      font-size: 15px;

    }

    button:hover {

      transform: scale(1.02);

      opacity: 0.95;

    }

    .color-preview {

      width: 100%;

      height: 65px;

      border-radius: 16px;

      margin-bottom: 20px;

      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.15);

    }

    #save-status {

      margin-top: 15px;

      color: #22c55e;

      display: none;

      text-align: center;

      font-weight: bold;

    }

    .lead {

      background: #1f2937;

      padding: 18px;

      border-radius: 18px;

      margin-bottom: 16px;

      border-left:
        4px solid #dc2626;

      line-height: 1.7;

      animation:
        fadeIn 0.3s ease;

    }

    .lead strong {

      color: #d1d5db;

    }

    .chat-log {

      background: #1f2937;

      padding: 18px;

      border-radius: 18px;

      margin-bottom: 16px;

      line-height: 1.7;

      border-left:
        4px solid #2563eb;

    }

    .chat-user {

      color: #22c55e;

      margin-bottom: 10px;

    }

    .chat-ai {

      color: #60a5fa;

    }

    @keyframes fadeIn {

      from {

        opacity: 0;

        transform:
          translateY(10px);

      }

      to {

        opacity: 1;

        transform:
          translateY(0);

      }

    }

    @media (max-width: 700px) {

      body {

        padding: 18px;

      }

      h1 {

        font-size: 30px;

      }

    }

  </style>

</head>

<body>

  <script>

    checkUser();

  </script>

  <div class="topbar">

    <div class="left-topbar">

      <h1>
        777 AI Dashboard
      </h1>

      <div
        class="user-email"
        id="userEmailText"
      >
        Loading user...
      </div>

    </div>

    <div class="top-actions">

      <div class="status">
        ● LIVE
      </div>

      <button
        class="logout-btn"
        onclick="logout()"
      >
        Logout
      </button>

    </div>

  </div>

  <div class="stats">

    <div class="stat-box">

      <div
        class="stat-number"
        id="leadCount"
      >
        0
      </div>

      <div class="stat-label">
        Total Leads
      </div>

    </div>

    <div class="stat-box">

      <div
        class="stat-number"
        id="chatCount"
      >
        0
      </div>

      <div class="stat-label">
        Conversations
      </div>

    </div>

    <div class="stat-box">

      <div class="stat-number">
        AI
      </div>

      <div class="stat-label">
        Assistant Online
      </div>

    </div>

  </div>

  <div class="dashboard-grid">

    <!-- SETTINGS -->

    <div class="card">

      <h2>
        Business Settings
      </h2>

      <label>
        Business Name
      </label>

      <input id="businessName" />

      <label>
        AI Prompt
      </label>

      <textarea
        id="prompt"
        rows="10"
      ></textarea>

      <label>
        Widget Color
      </label>

      <select id="primaryColor">

        <option value="#dc2626">
          Red
        </option>

        <option value="#2563eb">
          Blue
        </option>

        <option value="#16a34a">
          Green
        </option>

        <option value="#9333ea">
          Purple
        </option>

        <option value="#f59e0b">
          Orange
        </option>

        <option value="#ec4899">
          Pink
        </option>

        <option value="#06b6d4">
          Cyan
        </option>

      </select>

      <div
        class="color-preview"
        id="colorPreview"
      ></div>

      <button onclick="saveSettings()">
        Save Settings
      </button>

      <div id="save-status">
        ✅ Settings Saved
      </div>

    </div>

    <!-- LEADS -->

    <div class="card">

      <h2>
        Collected Leads
      </h2>

      <div id="leads">
        Loading...
      </div>

    </div>

    <!-- CHAT LOGS -->

    <div class="card">

      <h2>
        Recent Conversations
      </h2>

      <div id="chatLogs">
        Loading...
      </div>

    </div>

  </div>

  <script>

    const API_URL =
      "https://seven77luckydraws-ai.onrender.com";

    const businessId =
      "777luckydraws";

    const userEmail =
      "owner@777luckydraws.com";

    // USER INFO

    async function loadUser() {

      const {
        data
      } = await supabaseClient.auth.getUser();

      if (
        data.user
      ) {

        document.getElementById(
          "userEmailText"
        ).innerText =
          data.user.email;

      }

    }

    // COLOR PREVIEW

    document.getElementById(
      "primaryColor"
    ).addEventListener(
      "change",
      (event) => {

        document.getElementById(
          "colorPreview"
        ).style.background =
          event.target.value;

      }
    );

    // LOAD SETTINGS

    async function loadSettings() {

      try {

        const response =
          await fetch(
            `${API_URL}/settings?businessId=${businessId}`
          );

        const data =
          await response.json();

        document.getElementById(
          "businessName"
        ).value =
          data.business_name;

        document.getElementById(
          "prompt"
        ).value =
          data.ai_prompt;

        document.getElementById(
          "primaryColor"
        ).value =
          data.primary_color;

        document.getElementById(
          "colorPreview"
        ).style.background =
          data.primary_color;

      } catch (error) {

        console.log(error);

      }

    }

    // SAVE SETTINGS

    async function saveSettings() {

      const businessName =
        document.getElementById(
          "businessName"
        ).value;

      const aiPrompt =
        document.getElementById(
          "prompt"
        ).value;

      const primaryColor =
        document.getElementById(
          "primaryColor"
        ).value;

      try {

        await fetch(
          `${API_URL}/settings`,
          {

            method: "POST",

            headers: {

              "Content-Type":
                "application/json"

            },

            body: JSON.stringify({

              businessId,

              businessName,

              aiPrompt,

              primaryColor

            })

          }
        );

        const status =
          document.getElementById(
            "save-status"
          );

        status.style.display =
          "block";

        setTimeout(() => {

          status.style.display =
            "none";

        }, 2500);

      } catch (error) {

        console.log(error);

      }

    }

    // LOAD LEADS

    async function loadLeads() {

      try {

        const response =
          await fetch(
            `${API_URL}/leads?userEmail=${userEmail}`
          );

        const data =
          await response.json();

        document.getElementById(
          "leadCount"
        ).textContent =
          data.length;

        const leadsDiv =
          document.getElementById(
            "leads"
          );

        leadsDiv.innerHTML = "";

        if (!data.length) {

          leadsDiv.innerHTML =
            "No leads yet.";

          return;

        }

        data.forEach((lead) => {

          leadsDiv.innerHTML += `

            <div class="lead">

              <strong>Email:</strong>
              ${lead.email}

              <br><br>

              <strong>Message:</strong>
              ${lead.message}

              <br><br>

              <strong>Business:</strong>
              ${lead.business_id}

            </div>

          `;

        });

      } catch (error) {

        console.log(error);

      }

    }

    // LOAD CHAT LOGS

    async function loadChatLogs() {

      try {

        const response =
          await fetch(
            `${API_URL}/chat-logs?businessId=${businessId}`
          );

        const data =
          await response.json();

        document.getElementById(
          "chatCount"
        ).textContent =
          data.length;

        const chatDiv =
          document.getElementById(
            "chatLogs"
          );

        chatDiv.innerHTML = "";

        if (!data.length) {

          chatDiv.innerHTML =
            "No conversations yet.";

          return;

        }

        data.slice(0, 10).forEach((chat) => {

          chatDiv.innerHTML += `

            <div class="chat-log">

              <div class="chat-user">

                <strong>User:</strong>
                ${chat.user_message}

              </div>

              <div class="chat-ai">

                <strong>AI:</strong>
                ${chat.ai_reply}

              </div>

            </div>

          `;

        });

      } catch (error) {

        console.log(error);

      }

    }

    // AUTO REFRESH

    setInterval(() => {

      loadLeads();

      loadChatLogs();

    }, 10000);

    loadUser();

    loadSettings();

    loadLeads();

    loadChatLogs();

  </script>

</body>

</html>
